<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Presentation launcher for the FIFA World Cup event university project." />
    <title>FIFA Demo Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style/demo.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-hero">
        <span class="hero-kicker">University Presentation Mode</span>
        <h1>Choose which side of the project you want to present.</h1>
        <p>
          This page is the only presentation entry. Use one button for the fan user flow and the other for the admin
          control flow.
        </p>
      </section>

      <section class="demo-grid demo-grid-simple">
        <button id="open-user-demo-btn" class="demo-card demo-entry-btn" type="button">
          <span class="card-label">User Side</span>
          <h2>Open User Portal</h2>
          <p class="card-note">Open the fan page in a new tab with ready demo account and ticket data.</p>
        </button>

        <button id="open-control-demo-btn" class="demo-card demo-entry-btn" type="button">
          <span class="card-label">Admin Side</span>
          <h2>Open Control Center</h2>
          <p class="card-note">Open the control side in a new tab with admin access enabled from this demo entry.</p>
        </button>
      </section>
    </main>

    <script type="module" src="/src/js/demo-launcher.js"></script>
  </body>
</html>
