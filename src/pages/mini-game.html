<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIFA 2026 - Mini Football</title>
    <link rel="stylesheet" href="/src/style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --game-bg: #10b981;
            --pitch-line: rgba(255, 255, 255, 0.3);
            --ball-color: #ffffff;
            --goal-color: #ffffff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111827;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #065f46 0%, #064e3b 100%);
        }

        .pitch {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #10b981;
            background-image:
                repeating-linear-gradient(90deg, rgba(0, 0, 0, 0.05) 0px, rgba(0, 0, 0, 0.05) 50px, transparent 50px, transparent 100px),
                radial-gradient(circle at center, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            opacity: 1;
        }

        .goal-post {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 90px;
            border: 6px solid #fff;
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.2);
            z-index: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        .goal-net {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 12px 12px;
        }

        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
            /* Increased to be safely above the ball */
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .score-board {
            text-align: center;
            color: white;
        }

        .score-label {
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 48px;
            font-weight: 800;
            margin: 0;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .game-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            pointer-events: auto;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .reset-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            transition: all 0.3s ease;
        }

        .reset-btn:active {
            transform: scale(0.95);
        }

        .instruction {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            opacity: 0.6;
            font-size: 14px;
            text-align: center;
            width: 100%;
        }

        .goal-popup {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #000;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 100;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .goal-popup.active {
            transform: translate(-50%, -50%) scale(1);
        }

        /* Goalkeeper */
        .goalkeeper {
            position: absolute;
            top: 100px;
            left: 50%;
            width: 40px;
            height: 15px;
            background: #f87171;
            border-radius: 10px;
            transform: translateX(-50%);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            z-index: 1;
        }

        .level-badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fbbf24;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .next-level-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .next-level-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .next-level-card {
            background: #1f2937;
            padding: 40px;
            border-radius: 24px;
            text-align: center;
            border: 2px solid #fbbf24;
            box-shadow: 0 0 50px rgba(251, 191, 36, 0.3);
            max-width: 80%;
        }

        .next-level-card h2 {
            color: #fbbf24;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .next-level-card p {
            color: white;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .next-btn {
            background: #fbbf24;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .next-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }
    </style>
</head>

<body>
    <div id="game-container">
        <div class="pitch"></div>

        <!-- Decorative elements -->
        <div
            style="position: absolute; top: 10%; left: 10%; width: 100px; height: 100px; background: rgba(255,255,255,0.03); border-radius: 50%;">
        </div>
        <div
            style="position: absolute; bottom: 20%; right: 15%; width: 150px; height: 150px; background: rgba(255,255,255,0.02); border-radius: 50%;">
        </div>
        <div
            style="position: absolute; top: 40%; right: 5%; width: 80px; height: 80px; background: rgba(255,255,255,0.03); border-radius: 50%;">
        </div>

        <div class="goal-post">
            <div class="goal-net"></div>
        </div>
        <div id="goalkeeper" class="goalkeeper">
            <div
                style="width: 10px; height: 10px; background: #fff; border-radius: 50%; position: absolute; left: 5px; top: 2px;">
            </div>
            <div
                style="width: 10px; height: 10px; background: #fff; border-radius: 50%; position: absolute; right: 5px; top: 2px;">
            </div>
        </div>

        <canvas id="game-canvas"></canvas>
        <canvas id="particle-canvas"
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></canvas>

        <div class="ui-layer">
            <div class="score-board">
                <div id="level-indicator" class="level-badge">LEVEL 1</div>
                <h1 id="score" class="score-value">0</h1>
                <div style="font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 5px;">
                    Target: <span id="level-target">3</span>
                </div>
                <div id="combo-badge"
                    style="display: inline-block; background: #ef4444; color: white; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 12px; transform: scale(0); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-bottom: 5px;">
                    COMBO x2</div>
                <div style="font-size: 12px; color: #fbbf24; font-weight: 700; letter-spacing: 1px; opacity: 0.9;">STREAK:
                    <span id="high-score">0</span>
                </div>
            </div>

            <div class="instruction">Swipe the ball to score!</div>

            <div class="game-controls">
                <button class="back-btn" onclick="window.location.href='/src/pages/user-portal.html#portal'">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Exit
                </button>
                <button id="reset-btn" class="reset-btn">Reset</button>
            </div>
        </div>

        <div id="goal-popup" class="goal-popup">GOAL!!!</div>

        <div id="next-level-overlay" class="next-level-overlay">
            <div class="next-level-card">
                <h2 id="next-level-title">LEVEL COMPLETE!</h2>
                <p id="next-level-desc">You've reached the target goals!</p>
                <button id="next-level-btn" class="next-btn">NEXT LEVEL</button>
            </div>
        </div>
    </div>

    <script type="module" src="/src/js/mini-game.js"></script>
</body>

</html>
